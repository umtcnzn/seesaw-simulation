<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assets/icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <title>Seesaw Simulation</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="weightboard">
            <div class="left-weight">Left: <span id="left-weight-text">0</span> kg</div>
            <div class="right-weight">Right: <span id="right-weight-text">0</span> kg</div>
        </div>

        <div class="seesaw-container">
            <div class="plank"></div>
            <div class="pivot"></div>
        </div>

        <div class="button-container">
            <button id="reset-button">Reset</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
